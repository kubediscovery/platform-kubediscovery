name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent toolchain auto-download: the installed Go (set by actions/setup-go)
# is the authoritative toolchain for every job in this workflow.
env:
  GOTOOLCHAIN: local

jobs:
  detect-lint-modules:
    name: detect changed modules for lint
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          MODULES=(
            "libs"
            "services/kd-store"
          )

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          echo "Comparing changes: ${BASE_SHA}..${HEAD_SHA}"
          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"

          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "No changed files detected."
            echo "modules=[]" >> "$GITHUB_OUTPUT"
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED=()
          for module in "${MODULES[@]}"; do
            if echo "${CHANGED_FILES}" | grep -qE "^${module}/"; then
              SELECTED+=("${module}")
              echo "Will lint module: ${module}"
            else
              echo "Skipping module (no changes): ${module}"
            fi
          done

          if [[ ${#SELECTED[@]} -eq 0 ]]; then
            echo "No lint modules changed."
            echo "modules=[]" >> "$GITHUB_OUTPUT"
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MODULES_JSON="$(printf '%s\n' "${SELECTED[@]}" | jq -R . | jq -cs .)"
          echo "modules=${MODULES_JSON}" >> "$GITHUB_OUTPUT"
          echo "has_modules=true" >> "$GITHUB_OUTPUT"
          echo "Final lint module matrix: ${MODULES_JSON}"

  # ── Format ────────────────────────────────────────────────────────────────
  format:
    name: gofmt — check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Check gofmt formatting
        run: |
          UNFORMATTED=$(find . -type f -name "*.go" \
            ! -path "*/vendor/*" \
            ! -name "*.pb.go" \
            | sort | xargs gofmt -l 2>/dev/null)
          if [ -n "$UNFORMATTED" ]; then
            printf "The following files are not gofmt-formatted (run: gofmt -w <file>):\n%s\n" "$UNFORMATTED"
            exit 1
          fi
          echo "All Go files are properly formatted."

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: go build — compile all modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.work
            libs/go.sum
            services/kd-store/go.sum

      - name: Build all workspace modules
        run: go build all

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: go test — run all tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.work
            libs/go.sum
            services/kd-store/go.sum

      - name: Run tests (all modules)
        run: |
          # Use -mindepth 2 to skip the root go.mod (not a workspace module).
          find . -mindepth 2 -name "go.mod" ! -path "*/vendor/*" \
            | xargs -I{} dirname {} \
            | sort \
            | while read -r moddir; do
                echo "=== go test ${moddir} ==="
                (cd "${moddir}" && go test -v -count=1 -timeout 120s ./...)
              done

  # ── Vulnerability scan ────────────────────────────────────────────────────
  vuln:
    name: govulncheck — vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.work
            libs/go.sum
            services/kd-store/go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest all

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    needs: detect-lint-modules
    if: needs.detect-lint-modules.outputs.has_modules == 'true'
    name: golangci-lint — ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-lint-modules.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint (built with Go 1.26)
        # Build from source so the linter binary is compiled with the same Go
        # version as the project. Pre-built binaries from the action may be
        # compiled with an older Go toolchain and will refuse to analyse Go 1.26
        # code (exit code 3 "can't load config: go version lower than target").
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint (${{ matrix.module }})
        run: golangci-lint run --timeout=5m ./...
        working-directory: ${{ matrix.module }}

  lint-noop:
    needs: detect-lint-modules
    if: needs.detect-lint-modules.outputs.has_modules != 'true'
    name: golangci-lint — skipped (no changed modules)
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "No configured Go modules changed; skipping golangci-lint."
