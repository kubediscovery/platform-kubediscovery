syntax = "proto3";

package kubediscovery.v1;

option go_package = "github.com/kubediscovery/kd-libs/core/v1/analyzer;analyzerv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// AnalysisRequest carries Kubernetes incident context to kd-analyzer.
message AnalysisRequest {
  string request_id = 1;
  string source = 2;

  string cluster_name = 3;
  string environment = 4;
  string namespace = 5;
  string resource_kind = 6;
  string resource_name = 7;
  string pod_phase = 8;

  repeated string log_lines = 9;
  repeated string event_messages = 10;

  google.protobuf.Struct metadata = 11;
  google.protobuf.Timestamp observed_at = 12;
}

// MemoryKey identifies the semantic indexing partition used by kd-store.
message MemoryKey {
  string cluster_name = 1;
  string environment = 2;
  string namespace = 3;
  string value = 4;
}

// AnalysisResult returns diagnosis, severity and recommendations from kd-analyzer.
message AnalysisResult {
  string request_id = 1;
  string diagnosis = 2;
  string severity = 3;
  repeated string recommendations = 4;

  string summary = 5;
  string analysis_ref = 6;
  MemoryKey memory_key = 7;

  google.protobuf.Struct metadata = 8;
  google.protobuf.Timestamp analyzed_at = 9;
}
