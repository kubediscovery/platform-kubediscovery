syntax = "proto3";

package kubediscovery.v1;

option go_package = "github.com/kubediscovery/kd-libs/core/v1/gateway;gatewayv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// GatewayService defines a persistent bidirectional stream between kd-gateway
// (Control Plane) and kd-agent (Data Plane).
service GatewayService {
  // AgentStream is established by the agent and kept open for heartbeat,
  // commands and command results.
  rpc AgentStream(stream AgentStreamMessage) returns (stream AgentStreamMessage);
}

message AgentStreamMessage {
  oneof payload {
    AgentHello hello = 1;
    AgentHeartbeat heartbeat = 2;
    GatewayCommand command = 3;
    AgentCommandResult command_result = 4;
  }
}

message AgentHello {
  // Logical agent identifier (self-reported, used as mapping key in memory).
  string caller_id = 1;

  // Untrusted free-form metadata for diagnostics.
  google.protobuf.Struct metadata = 2;

  // Time when the hello frame was generated by the agent.
  google.protobuf.Timestamp sent_at = 3;
}

message AgentHeartbeat {
  string request_id = 1;
  string caller_id = 2;
  google.protobuf.Timestamp sent_at = 3;
}

message GatewayCommand {
  string request_id = 1;
  string target_caller_id = 2;
  string operation = 3;
  google.protobuf.Struct payload = 4;
  google.protobuf.Timestamp sent_at = 5;
}

message AgentCommandResult {
  string request_id = 1;
  string caller_id = 2;
  bool success = 3;
  string message = 4;
  google.protobuf.Struct payload = 5;
  google.protobuf.Timestamp responded_at = 6;
}
